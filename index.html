<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Contact</h1>

    <form id="form" action="message.php" method="post">
      <input name="name" type="text" placeholder="Your name">
      <input name="email" type="text" placeholder="Your email">
      <textarea name="message" placeholder="Your message"></textarea>

      <!-- No proof-of-work fields here: script.js adds them at submit time, so the
           page source stays a plain contact form. The browser solves and re-POSTs
           automatically; users just press Send. -->
      <input id="submit" type="submit" value="Send">
      <div class="status-area"><span></span></div>
    </form>
  </div>
  <script src="script.min.js"></script>
</body>
</html>
